name: "Build-Release-PYPI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Create virtual environment
        run: |
          python -m venv venv
      - name: Install dependencies in virtual environment
        run: |
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade pyinstaller
          python -m pip install --upgrade -e .
        shell: pwsh
      - name: Build executable
        run: |
          .\venv\Scripts\Activate.ps1
          pyinstaller MediaRelay.spec
        shell: pwsh
      - name: Rename executable
        run: |
          Rename-Item -Path dist/MediaRelay.exe -NewName MediaRelay-v1.0.${{ github.run_number }}.exe
        shell: pwsh
      - name: Stage Windows release bundle
        run: |
          $bundleName = "MediaRelay-v1.0.${{ github.run_number }}"
          $releaseDir = "dist/$bundleName"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$releaseDir/docs" | Out-Null
          Move-Item -Path "dist/$bundleName.exe" -Destination $releaseDir
          Copy-Item -Path ".env.example" -Destination $releaseDir
          Copy-Item -Path "SECURITY.md" -Destination $releaseDir
          Copy-Item -Path "LICENSE.md" -Destination $releaseDir
          Copy-Item -Path "docs/deployment_guide.md" -Destination "$releaseDir/docs/"
          Copy-Item -Path "docs/configuration_reference.md" -Destination "$releaseDir/docs/"
        shell: pwsh
      - name: Zip the release bundle
        run: |
          $bundleName = "MediaRelay-v1.0.${{ github.run_number }}"
          $zip = "dist/$bundleName.zip"
          Compress-Archive -Path "dist/$bundleName" -DestinationPath $zip -Force
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/MediaRelay-v1.0.${{ github.run_number }}.zip

  build-wheels:
    name: Build Python wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade build

      - name: Build pure Python wheel and sdist
        run: |
          python -m build

      - name: Store artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

  create-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: ./build
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./build/MediaRelay-v1.0.${{ github.run_number }}.zip
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          removeArtifacts: true

  publish-pypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish wheels to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install --upgrade wheel
          python -m pip install --upgrade twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_MEDIARELAY }}
        run: |
          twine check dist/*
          twine upload dist/*
