[mypy]
# Python version compatibility
python_version = 3.12

# Import discovery
namespace_packages = True
explicit_package_bases = True

# Strict type checking - catch more issues
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True

# Subclassing and any types
disallow_subclassing_any = True
disallow_any_unimported = True
disallow_any_expr = True
disallow_any_decorated = True
disallow_any_explicit = True
disallow_any_generics = True

# None and optional handling
no_implicit_optional = True
strict_optional = True

# Configuring warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True
warn_unused_configs = True

# Suppressing errors
ignore_missing_imports = False
follow_imports = normal
no_implicit_reexport = True

# Configuring error output
show_error_codes = True
show_column_numbers = True
show_error_context = True
color_output = True
error_summary = True
pretty = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Advanced options
strict_equality = True
extra_checks = True

# Strict mode equivalent settings
# strict = False  # We configure manually for more control - commented out as we set individual options

# Per-module options for third-party libraries
[mypy-flask_limiter.*]
ignore_missing_imports = True

[mypy-waitress.*]
ignore_missing_imports = False

[mypy-psutil.*]
ignore_missing_imports = False

[mypy-colorlog.*]
ignore_missing_imports = True

# Core application files - maximum strictness
[mypy-mediarelay.server]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call, no-any-return

[mypy-mediarelay.config]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc

[mypy-mediarelay.logging_config]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call

[mypy-mediarelay.lockout]
warn_return_any = True
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc

[mypy-mediarelay.session_store]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call, arg-type

[mypy-mediarelay.handlers]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-any-return, attr-defined

[mypy-mediarelay.auth]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call, no-any-return

[mypy-mediarelay.routes]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call, no-any-return, untyped-decorator

[mypy-mediarelay.error_handlers]
warn_return_any = True
warn_unused_ignores = False
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disable_error_code = misc, no-untyped-call, untyped-decorator

# Utility scripts - balanced checking
[mypy-mediarelay.generate_password]
disallow_untyped_defs = False
disallow_untyped_calls = False
warn_return_any = False
warn_unused_ignores = False
disable_error_code = misc, no-untyped-call
# But still catch common issues
disallow_incomplete_defs = True

# Generated or external code
[mypy-flask.*]
ignore_missing_imports = True

[mypy-werkzeug.*]
ignore_missing_imports = True

[mypy-click.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

# Relaxed rules for test code
[mypy-tests.*]
disallow_any_decorated = False
disallow_untyped_calls = False
warn_return_any = False
disable_error_code = union-attr
disallow_any_expr = True
strict_equality = True